<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Checklist légère pour suivre l'avancement SoundKey V2." />
  <title>SoundKey — Suivi d’avancement</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>SoundKey — Suivi d’avancement</h1>
      <p class="subtitle">Checklist projet V2 (statique, locale, rapide)</p>
    </header>

    <section class="progress-card" aria-live="polite">
      <div class="progress-meta">
        <strong id="progressPercent">0%</strong>
        <span id="progressCount">0 / 0 tâches faites</span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </section>

    <section class="actions">
      <button id="exportBtn" type="button">Export JSON</button>
      <label class="import-label" for="importInput">Import JSON</label>
      <input id="importInput" type="file" accept="application/json" />
      <button id="resetBtn" type="button" class="danger">Reset seed</button>
    </section>

    <section id="sections" class="sections"></section>

    <footer class="notes" id="notes"></footer>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
